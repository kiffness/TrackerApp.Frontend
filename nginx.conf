server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — Vite fingerprints them so this is safe
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
